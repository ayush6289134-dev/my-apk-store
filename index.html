<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My APK Store - Download Top Apps & Games</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; padding-bottom: 40px; }
        
        /* Header */
        header { background: #1e293b; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .logo { font-size: 20px; font-weight: bold; color: #10b981; text-decoration: none; }
        
        /* Search Bar */
        .search-container { padding: 20px; text-align: center; }
        .search-box { width: 100%; max-width: 500px; padding: 12px 20px; border-radius: 25px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; font-size: 15px; }
        
        /* Section Title */
        .section-title { margin: 20px; font-size: 18px; color: #cbd5e1; text-align: left; border-left: 4px solid #10b981; padding-left: 10px; }
        
        /* App Grid */
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 0 20px; }
        .app-card { background: #1e293b; border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #334155; }
        .app-icon { width: 70px; height: 70px; border-radius: 16px; object-fit: cover; margin-bottom: 10px; }
        .app-name { font-size: 14px; font-weight: 600; margin-bottom: 5px; color: #f8fafc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-size { font-size: 12px; color: #94a3b8; margin-bottom: 10px; }
        .download-btn { display: block; width: 100%; padding: 8px 0; background: #10b981; color: white; text-decoration: none; border-radius: 8px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">📱 My APK Store</a>
    </header>

    <div class="search-container">
        <input type="text" class="search-box" placeholder="Search apps & games...">
    </div>

    <h2 class="section-title">Featured App</h2>
    
    <div class="app-grid">
        <!-- Aapka Main App -->
        <div class="app-card">
            <img src="https://via.placeholder.com/70/10b981/ffffff?text=APK" class="app-icon" alt="App Icon">
            <div class="app-name">My First App</div>
            <div class="app-size">Download Available</div>
            <a href="https://drive.google.com/uc?export=download&id=1UEY_aJD0PMKuk-yeQ9LmpTr6W08YLprh" class="download-btn" target="_blank">Download APK</a>
        </div>
    </div>

</body>
</html>
